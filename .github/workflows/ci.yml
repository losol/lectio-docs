name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: the job only needs to check the repo out.
permissions:
  contents: read

jobs:
  build:
    name: Build and typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # Reads the pinned version from the root package.json "packageManager" field.
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Topological: lectio-docs -> lectio-docs-react -> site.
      # The site's build also runs `collect`, so this exercises the whole
      # docs pipeline: collect -> manifest -> search index -> prerender.
      - run: pnpm -r build

      - run: pnpm --filter site typecheck
