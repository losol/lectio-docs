name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

# Needs to write the version branch and open the PR that carries it.
permissions:
  contents: write
  pull-requests: write

jobs:
  version:
    name: Version packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # changesets compares against the base branch, so it needs history.
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Collects pending changesets into a "version packages" PR: bumps
      # versions and writes CHANGELOG entries. Merging that PR is what makes a
      # release real.
      #
      # No `publish:` step yet. Both packages are still private, so there is
      # nothing to push to a registry until Phase 3 decides npm vs GitHub
      # Packages and flips them public.
      - uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm changeset:version
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
