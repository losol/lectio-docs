name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # version branch and release tags
  pull-requests: write # open the version PR
  id-token: write # OIDC for npm trusted publishing

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    # npm trusted publishing — no NPM_TOKEN anywhere. With no token set, the
    # changesets action skips writing an .npmrc and pnpm exchanges this job's
    # OIDC token for a short-lived credential; provenance comes with it.
    #
    # One-time bootstrap per NEW package: npm cannot configure a trusted
    # publisher for a name that does not exist yet, so a package's first
    # release is published manually, then its trusted publisher is set to this
    # repo + release.yml (+ this environment). The environment also carries the
    # main-only deployment branch restriction — set in repo settings.
    environment: npm
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # changesets compares against the base branch, so it needs history.
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Pending changesets become a "version packages" PR. Once that PR is
      # merged there is nothing pending, and the same step publishes instead:
      # topologically ordered, tagged per package, and — since
      # createGithubReleases defaults to true — released on GitHub as well.
      #
      # `release` builds before publishing, per the action's own guidance:
      # changeset publish ships whatever is on disk. No registry-url on
      # setup-node and no token in env — with NPM_TOKEN absent the action
      # leaves .npmrc alone and publishing rides on OIDC.
      - uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm changeset:version
          publish: pnpm release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
